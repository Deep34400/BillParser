services:
  db:
    image: postgres:16
    environment: { POSTGRES_USER: invoice, POSTGRES_PASSWORD: invoice, POSTGRES_DB: invoice }
    volumes: [ "pgdata:/var/lib/postgresql/data" ]
    ports: [ "5433:5432" ]
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U invoice -d invoice" ]
      interval: 3s
      timeout: 3s
      retries: 15
  api:
    build: { context: ., dockerfile: api/Dockerfile }
    environment:
      DATABASE_URL: postgresql://invoice:invoice@db:5432/invoice?schema=public
      APP_SECRET: ${APP_SECRET:-dev-secret-change-me}
      UPLOAD_DIR: /data/uploads
      PORT: 4000
      EXTRACTION_PROVIDER: ${EXTRACTION_PROVIDER:-ollama}
      STRUCTURING_MODEL_PROVIDER: ${STRUCTURING_MODEL_PROVIDER:-ollama}
      STRUCTURING_MODEL: ${STRUCTURING_MODEL:-qwen2.5:3b}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-glm-ocr}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      AZURE_DI_ENDPOINT: ${AZURE_DI_ENDPOINT:-}
      AZURE_DI_KEY: ${AZURE_DI_KEY:-}
      LLAMAPARSE_API_KEY: ${LLAMAPARSE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      IMPORT_DIR: /data/import
    volumes: [ "uploads:/data/uploads", "./import:/data/import" ]
    depends_on:
      db:
        condition: service_healthy
    ports: [ "4000:4000" ]
  web:
    build: { context: ., dockerfile: web/Dockerfile }
    depends_on: [ api ]
    ports: [ "8081:80" ]
volumes: { pgdata: {}, uploads: {} }
